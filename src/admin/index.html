<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeDeepseekAPI 管理界面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a1a2e; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-item { background: #f8f9fc; padding: 16px; border-radius: 8px; text-align: center; }
        .stat-item .number { font-size: 28px; font-weight: 700; color: #4a6cf7; }
        .stat-item .label { font-size: 13px; color: #888; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 12px; background: #f8f9fc; border-bottom: 2px solid #e9edf4; }
        td { padding: 10px 12px; border-bottom: 1px solid #e9edf4; }
        .status-badge { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 12px; }
        .status-ok { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
        .status-warning { background: #fff3cd; color: #856404; }
        .btn { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-primary { background: #4a6cf7; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .refresh-btn { float: right; background: #4a6cf7; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; margin-left: 8px; }
        .refresh-btn:hover { background: #3a5cd9; }
        .empty { text-align: center; color: #999; padding: 30px 0; }
        h3 { margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>FreeDeepseekAPI 管理界面</h1>
    <div class="card">
        <button class="refresh-btn" onclick="fetchAll()">刷新</button>
        <button class="refresh-btn" onclick="reloadAccounts()">重载账号</button>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-item"><div class="number" id="totalAccounts">-</div><div class="label">总账号</div></div>
            <div class="stat-item"><div class="number" id="readyAccounts">-</div><div class="label">认证就绪</div></div>
            <div class="stat-item"><div class="number" id="activeSessions">-</div><div class="label">活跃代理</div></div>
            <div class="stat-item"><div class="number" id="proxyAuthStatus">-</div><div class="label">代理鉴权</div></div>
        </div>
    </div>
    <div class="card">
        <h3>账号列表</h3>
        <div id="accountsTable"><div class="empty">加载中...</div></div>
    </div>
    <div class="card">
        <h3>活跃代理会话</h3>
        <div id="sessionsTable"><div class="empty">加载中...</div></div>
    </div>
    <div class="card" id="proxyAuthCard" style="display:none">
        <h3>代理鉴权状态</h3>
        <div id="proxyAuthInfo"></div>
    </div>
</div>
<script>
    const API_BASE = window.location.origin;

    async function fetchAll() {
        try {
            const health = await fetch(`${API_BASE}/health`).then(r => r.json());
            document.getElementById('totalAccounts').textContent = health.accounts?.length || 0;
            const readyCount = (health.accounts || []).filter(a => a.ready).length;
            document.getElementById('readyAccounts').textContent = readyCount;
            document.getElementById('activeSessions').textContent = health.agents || 0;
        } catch (e) {}

        try {
            const accounts = await fetch(`${API_BASE}/admin/accounts`).then(r => r.json());
            renderAccounts(accounts || []);
        } catch (e) {}

        try {
            const sessions = await fetch(`${API_BASE}/v1/sessions`).then(r => r.json());
            renderSessions(sessions?.agents || []);
        } catch (e) {}

        try {
            const pa = await fetch(`${API_BASE}/admin/proxy-auth`).then(r => r.json());
            document.getElementById('proxyAuthStatus').textContent = pa.enabled ? '已启用' : '未启用';
            document.getElementById('proxyAuthCard').style.display = 'block';
            document.getElementById('proxyAuthInfo').innerHTML =
                `启用: ${pa.enabled}<br>API Keys: ${pa.apiKeys?.length || 0}<br>Bearer Tokens: ${pa.bearerTokens?.length || 0}`;
        } catch (e) {}
    }

    async function reloadAccounts() {
        await fetch(`${API_BASE}/admin/accounts/reload`, { method: 'POST' });
        fetchAll();
    }

    function renderAccounts(accounts) {
        const container = document.getElementById('accountsTable');
        if (!accounts.length) {
            container.innerHTML = '<div class="empty">暂无账号</div>';
            return;
        }
        let html = '<table><tr><th>ID</th><th>就绪</th><th>冷却</th><th>失败</th><th>最后使用</th><th>操作</th></tr>';
        for (const acc of accounts) {
            const status = acc.cooldown ? '⏳' : (acc.ready ? '✅' : '❌');
            const statusClass = acc.cooldown ? 'status-warning' : (acc.ready ? 'status-ok' : 'status-error');
            html += `<tr>
                <td>${acc.id}</td>
                <td><span class="status-badge ${statusClass}">${status}</span></td>
                <td>${acc.cooldown ? acc.cooldown_remaining_sec + 's' : '-'}</td>
                <td>${acc.failures || 0}</td>
                <td>${acc.last_used_at ? new Date(acc.last_used_at).toLocaleString() : '-'}</td>
                <td><button class="btn btn-danger btn-sm" onclick="toggleAccount('${acc.id}')">切换状态</button></td>
            </tr>`;
        }
        html += '</table>';
        container.innerHTML = html;
    }

    function renderSessions(agents) {
        const container = document.getElementById('sessionsTable');
        if (!agents.length) {
            container.innerHTML = '<div class="empty">暂无活跃代理</div>';
            return;
        }
        let html = '<table><tr><th>Agent</th><th>会话ID</th><th>消息数</th><th>账号</th><th>Bootstrap</th><th>操作</th></tr>';
        for (const s of agents) {
            html += `<tr>
                <td>${s.agent}</td>
                <td>${(s.session_id || 'N/A').slice(0, 12)}...</td>
                <td>${s.message_count || 0}</td>
                <td>${s.account || '-'}</td>
                <td>${s.bootstrap_injected ? '✅' : '❌'}</td>
                <td><button class="btn btn-danger btn-sm" onclick="resetSession('${s.agent}')">重置</button></td>
            </tr>`;
        }
        html += '</table>';
        container.innerHTML = html;
    }

    async function toggleAccount(id) {
        await fetch(`${API_BASE}/admin/accounts/${id}/toggle`, { method: 'POST' });
        fetchAll();
    }

    async function resetSession(agent) {
        await fetch(`${API_BASE}/reset-session?agent=${agent}`, { method: 'POST' });
        fetchAll();
    }

    fetchAll();
    setInterval(fetchAll, 10000);
</script>
</body>
</html>
